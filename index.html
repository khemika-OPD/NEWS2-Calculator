<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWS 2 Color Step - OPD Takhli</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #007bff; --dark-border: #000; --soft-pink: #fff0f3;
            /* สีระดับ NEWS */
            --news-0: #27ae60; /* เขียว */
            --news-1: #f1c40f; /* เหลือง */
            --news-2: #e67e22; /* ส้ม */
            --news-3: #d63031; /* แดง */
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--soft-pink); margin: 0; padding: 5px; display: flex; justify-content: center; }
        .main-card { max-width: 450px; width: 100%; background: #fff; border-radius: 12px; border: 3px solid var(--dark-border); overflow: hidden; display: flex; flex-direction: column; }
        
        .header { background: linear-gradient(135deg, #007bff, #0056b3); color: white; padding: 10px; text-align: center; border-bottom: 3px solid var(--dark-border); }
        .header h1 { margin: 0; font-size: 1rem; }
        .header p { margin: 1px 0; font-size: 0.75rem; }

        .body { padding: 15px; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
        .step { display: none; }
        .step.active { display: block; }

        .question-label { font-size: 1.1rem; font-weight: 700; color: #0056b3; margin-bottom: 15px; display: block; text-align: center; }
        
        .radio-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
        .radio-grid input[type="radio"] { display: none; }
        .radio-grid label {
            display: block; padding: 12px; border-radius: 10px; cursor: pointer;
            font-size: 0.95rem; text-align: center; font-weight: 700; border: 2px solid #ccc; transition: 0.2s;
        }

        /* สีประจำปุ่มแต่ละระดับ */
        .btn-0 { background-color: #e8f5e9; border-color: var(--news-0) !important; color: #1b5e20; }
        .btn-1 { background-color: #fffde7; border-color: var(--news-1) !important; color: #827717; }
        .btn-2 { background-color: #fff3e0; border-color: var(--news-2) !important; color: #e65100; }
        .btn-3 { background-color: #ffebee; border-color: var(--news-3) !important; color: #b71c1c; }

        /* เมื่อกดเลือก (ให้สีเข้มขึ้น) */
        input[type="radio"]:checked + .btn-0 { background-color: var(--news-0); color: white; }
        input[type="radio"]:checked + .btn-1 { background-color: var(--news-1); color: white; }
        input[type="radio"]:checked + .btn-2 { background-color: var(--news-2); color: white; }
        input[type="radio"]:checked + .btn-3 { background-color: var(--news-3); color: white; }

        .nav-btns { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-family: 'Sarabun'; font-weight: 700; cursor: pointer; flex: 1; }
        .btn-back { background: #6c757d; color: white; }

        .result-screen { text-align: center; }
        .score-val { font-size: 4rem; font-weight: 700; line-height: 1; color: #333; margin: 10px 0; }
        .advice-box { padding: 15px; border-radius: 10px; color: white; font-weight: 700; border: 3px solid var(--dark-border); }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>NEWS 2 Calculator (Color)</h1>
        <p>OPD รพ.ตาคลี | พัฒนาโดย Khemika-OPD Takhli</p>
    </div>

    <div class="body">
        <!-- Step 1: RR -->
        <div class="step active" id="step1">
            <span class="question-label">1. อัตราการหายใจ (RR)</span>
            <div class="radio-grid">
                <input type="radio" name="rr" id="rr3_low" value="3" onclick="nextStep(2)"><label for="rr3_low" class="btn-3">≤ 8</label>
                <input type="radio" name="rr" id="rr1_low" value="1" onclick="nextStep(2)"><label for="rr1_low" class="btn-1">9 - 11</label>
                <input type="radio" name="rr" id="rr0" value="0" onclick="nextStep(2)"><label for="rr0" class="btn-0">12 - 20</label>
                <input type="radio" name="rr" id="rr2_high" value="2" onclick="nextStep(2)"><label for="rr2_high" class="btn-2">21 - 24</label>
                <input type="radio" name="rr" id="rr3_high" value="3" onclick="nextStep(2)"><label for="rr3_high" class="btn-3">≥ 25</label>
            </div>
        </div>

        <!-- Step 2: SpO2 Scale -->
        <div class="step" id="step2">
            <span class="question-label">2. เลือก SpO2 Scale</span>
            <div class="radio-grid">
                <input type="radio" name="scale" id="s1" value="1" onclick="nextStep(3)"><label for="s1" class="btn-0">Scale 1 (คนไข้ทั่วไป)</label>
                <input type="radio" name="scale" id="s2" value="2" onclick="nextStep(3)"><label for="s2" class="btn-0">Scale 2 (COPD/CO2 คั่ง)</label>
            </div>
            <div class="nav-btns"><button class="btn btn-back" onclick="prevStep(1)">กลับ</button></div>
        </div>

        <!-- Step 3: SpO2 Value -->
        <div class="step" id="step3">
            <span class="question-label">3. ค่า SpO2 (%)</span>
            <div id="scale1_opts" class="radio-grid">
                <input type="radio" name="spo2" id="sp0" value="0" onclick="nextStep(4)"><label for="sp0" class="btn-0">≥ 96</label>
                <input type="radio" name="spo2" id="sp1" value="1" onclick="nextStep(4)"><label for="sp1" class="btn-1">94 - 95</label>
                <input type="radio" name="spo2" id="sp2" value="2" onclick="nextStep(4)"><label for="sp2" class="btn-2">92 - 93</label>
                <input type="radio" name="spo2" id="sp3" value="3" onclick="nextStep(4)"><label for="sp3" class="btn-3">≤ 91</label>
            </div>
            <div id="scale2_opts" class="radio-grid" style="display:none;">
                <input type="radio" name="spo2_2" id="sp2_0" value="0" onclick="nextStep(4)"><label for="sp2_0" class="btn-0">88-92 หรือ ≥93(air)</label>
                <input type="radio" name="spo2_2" id="sp2_1" value="1" onclick="nextStep(4)"><label for="sp2_1" class="btn-1">86 - 87</label>
                <input type="radio" name="spo2_2" id="sp2_2" value="2" onclick="nextStep(4)"><label for="sp2_2" class="btn-2">84 - 85</label>
                <input type="radio" name="spo2_2" id="sp2_3" value="3" onclick="nextStep(4)"><label for="sp2_3" class="btn-3">≤ 83 หรือ ≥93(O2)</label>
            </div>
            <div class="nav-btns"><button class="btn btn-back" onclick="prevStep(2)">กลับ</button></div>
        </div>

        <!-- Step 4: Air/O2 -->
        <div class="step" id="step4">
            <span class="question-label">4. อากาศ (Air) หรือ ออกซิเจน?</span>
            <div class="radio-grid">
                <input type="radio" name="o2" id="o2_no" value="0" onclick="nextStep(5)"><label for="o2_no" class="btn-0">Air (อากาศปกติ)</label>
                <input type="radio" name="o2" id="o2_yes" value="2" onclick="nextStep(5)"><label for="o2_yes" class="btn-2">Oxygen Supplement</label>
            </div>
            <div class="nav-btns"><button class="btn btn-back" onclick="prevStep(3)">กลับ</button></div>
        </div>

        <!-- Step 5: SBP -->
        <div class="step" id="step5">
            <span class="question-label">5. ความดัน SBP (mmHg)</span>
            <div class="radio-grid">
                <input type="radio" name="sbp" id="sbp3_high" value="3" onclick="nextStep(6)"><label for="sbp3_high" class="btn-3">≥ 220</label>
                <input type="radio" name="sbp" id="sbp0" value="0" onclick="nextStep(6)"><label for="sbp0" class="btn-0">111 - 219</label>
                <input type="radio" name="sbp" id="sbp1" value="1" onclick="nextStep(6)"><label for="sbp1" class="btn-1">101 - 110</label>
                <input type="radio" name="sbp" id="sbp2" value="2" onclick="nextStep(6)"><label for="sbp2" class="btn-2">91 - 100</label>
                <input type="radio" name="sbp" id="sbp3_low" value="3" onclick="nextStep(6)"><label for="sbp3_low" class="btn-3">≤ 90</label>
            </div>
            <div class="nav-btns"><button class="btn btn-back" onclick="prevStep(4)">กลับ</button></div>
        </div>

        <!-- Step 6: Pulse -->
        <div class="step" id="step6">
            <span class="question-label">6. ชีพจร (Pulse)</span>
            <div class="radio-grid">
                <input type="radio" name="hr" id="hr3_high" value="3" onclick="nextStep(7)"><label for="hr3_high" class="btn-3">≥ 131</label>
                <input type="radio" name="hr" id="hr2_high" value="2" onclick="nextStep(7)"><label for="hr2_high" class="btn-2">111 - 130</label>
                <input type="radio" name="hr" id="hr1_high" value="1" onclick="nextStep(7)"><label for="hr1_high" class="btn-1">91 - 110</label>
                <input type="radio" name="hr" id="hr0" value="0" onclick="nextStep(7)"><label for="hr0" class="btn-0">51 - 90</label>
                <input type="radio" name="hr" id="hr1_low" value="1" onclick="nextStep(7)"><label for="hr1_low" class="btn-1">41 - 50</label>
                <input type="radio" name="hr" id="hr3_low" value="3" onclick="nextStep(7)"><label for="hr3_low" class="btn-3">≤ 40</label>
            </div>
            <div class="nav-btns"><button class="btn btn-back" onclick="prevStep(5)">กลับ</button></div>
        </div>

        <!-- Step 7: Consciousness -->
        <div class="step" id="step7">
            <span class="question-label">7. ความรู้สึกตัว (ACVPU)</span>
            <div class="radio-grid">
                <input type="radio" name="loc" id="loc0" value="0" onclick="nextStep(8)"><label for="loc0" class="btn-0">Alert (ตื่นดี)</label>
                <input type="radio" name="loc" id="loc3" value="3" onclick="nextStep(8)"><label for="loc3" class="btn-3">Confusion / Voice / Pain / Unresp.</label>
            </div>
            <div class="nav-btns"><button class="btn btn-back" onclick="prevStep(6)">กลับ</button></div>
        </div>

        <!-- Step 8: Temp -->
        <div class="step" id="step8">
            <span class="question-label">8. อุณหภูมิ (°C)</span>
            <div class="radio-grid">
                <input type="radio" name="t" id="t2_high" value="2" onclick="finish()"><label for="t2_high" class="btn-2">≥ 39.1</label>
                <input type="radio" name="t" id="t1_high" value="1" onclick="finish()"><label for="t1_high" class="btn-1">38.1 - 39.0</label>
                <input type="radio" name="t" id="t0" value="0" onclick="finish()"><label for="t0" class="btn-0">36.1 - 38.0</label>
                <input type="radio" name="t" id="t1_low" value="1" onclick="finish()"><label for="t1_low" class="btn-1">35.1 - 36.0</label>
                <input type="radio" name="t" id="t3_low" value="3" onclick="finish()"><label for="t3_low" class="btn-3">≤ 35.0</label>
            </div>
            <div class="nav-btns"><button class="btn btn-back" onclick="prevStep(7)">กลับ</button></div>
        </div>

        <!-- Result Screen -->
        <div class="step" id="resultStep">
            <div class="result-screen">
                <span class="question-label">สรุปผล NEWS 2</span>
                <div class="score-val" id="totalScore">0</div>
                <div id="adviceBox" class="advice-box"></div>
                <button class="btn" style="margin-top:20px; background:#333; color:white;" onclick="location.reload()">เริ่มประเมินใหม่</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentStep = 1;
    function nextStep(s) {
        if (s === 3) {
            const scale = document.querySelector('input[name="scale"]:checked').value;
            document.getElementById('scale1_opts').style.display = (scale === "1") ? "grid" : "none";
            document.getElementById('scale2_opts').style.display = (scale === "2") ? "grid" : "none";
        }
        document.getElementById(`step${currentStep}`).classList.remove('active');
        document.getElementById(`step${s}`).classList.add('active');
        currentStep = s;
    }

    function prevStep(s) {
        document.getElementById(`step${currentStep}`).classList.remove('active');
        document.getElementById(`step${s}`).classList.add('active');
        currentStep = s;
    }

    function finish() {
        let total = 0;
        const scale = document.querySelector('input[name="scale"]:checked').value;
        
        total += parseInt(document.querySelector('input[name="rr"]:checked').value);
        if (scale === "1") total += parseInt(document.querySelector('input[name="spo2"]:checked').value);
        else total += parseInt(document.querySelector('input[name="spo2_2"]:checked').value);
        
        total += parseInt(document.querySelector('input[name="o2"]:checked').value);
        total += parseInt(document.querySelector('input[name="sbp"]:checked').value);
        total += parseInt(document.querySelector('input[name="hr"]:checked').value);
        total += parseInt(document.querySelector('input[name="loc"]:checked').value);
        total += parseInt(document.querySelector('input[name="t"]:checked').value);

        document.getElementById('totalScore').innerText = total;
        const box = document.getElementById('adviceBox');
        
        if (total === 0) { box.style.backgroundColor = "#27ae60"; box.innerText = "เสี่ยงต่ำ: ติดตามตามรอบปกติ"; }
        else if (total <= 4) { box.style.backgroundColor = "#f39c12"; box.innerText = "เสี่ยงต่ำ-ปานกลาง: ประเมินซ้ำทุก 4-6 ชม."; }
        else if (total <= 6) { box.style.backgroundColor = "#e67e22"; box.innerText = "เสี่ยงปานกลาง: ประเมินทุก 1 ชม. / ตามแพทย์"; }
        else { box.style.backgroundColor = "#d63031"; box.innerText = "เสี่ยงสูง: ตามทีมกู้ชีพทันที!"; }

        document.getElementById(`step${currentStep}`).classList.remove('active');
        document.getElementById('resultStep').classList.add('active');
    }
</script>
</body>
</html>
