<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWS 2 - OPD Takhli</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #007bff; --dark-border: #000; --soft-pink: #fff0f3; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--soft-pink); margin: 0; padding: 5px; display: flex; justify-content: center; }
        .main-card { max-width: 450px; width: 100%; background: #fff; border-radius: 10px; border: 3px solid var(--dark-border); overflow: hidden; display: flex; flex-direction: column; }
        
        /* ส่วนหัวที่กระชับลง */
        .header { background: linear-gradient(135deg, #007bff, #0056b3); color: white; padding: 6px; text-align: center; border-bottom: 3px solid var(--dark-border); }
        .header h1 { margin: 0; font-size: 0.9rem; }
        .header p { margin: 1px 0; font-size: 0.7rem; }

        .body { padding: 8px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; border-bottom: 1px solid #eee; padding-bottom: 2px; }
        .label { font-size: 0.8rem; font-weight: 700; flex: 1; }
        
        input, select { padding: 4px; border-radius: 6px; border: 1px solid #ccc; font-family: 'Sarabun'; font-size: 0.85rem; width: 85px; text-align: center; }
        
        /* ส่วนแสดงผลคะแนน */
        .result-box { text-align: center; padding: 6px; border-radius: 10px; color: White; border: 3px solid var(--dark-border); margin-top: 5px; }
        .score-val { font-size: 2.2rem; font-weight: 700; line-height: 1; }
        .advice { font-size: 0.75rem; font-weight: 700; margin-top: 2px; background: rgba(0,0,0,0.1); padding: 4px; border-radius: 5px; }

        .share-area { background: #f8f9fa; padding: 8px; text-align: center; border-top: 2px dashed #ccc; }
        #qrcode_display { display: none; justify-content: center; margin: 8px 0; }
        .btn-action { background: #333; color: white; border: none; padding: 8px; border-radius: 6px; font-family: 'Sarabun'; font-weight: 700; cursor: pointer; width: 100%; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>NEWS 2 Calculator</h1>
        <p>OPD รพ.ตาคลี | พัฒนาโดย เขมิกา พงษ์ศรี</p>
    </div>

    <div class="body">
        <div class="row"><span class="label">1. RR (ครั้ง/นาที)</span><input type="number" id="rr" oninput="calc()"></div>
        <div class="row">
            <span class="label">2. เลือก SpO2 Scale</span>
            <select id="scale" onchange="calc()">
                <option value="1">Scale 1 (ทั่วไป)</option>
                <option value="2">Scale 2 (COPD)</option>
            </select>
        </div>
        <div class="row"><span class="label">3. SpO2 (%)</span><input type="number" id="spo2" oninput="calc()"></div>
        <div class="row">
            <span class="label">4. อากาศ/ออกซิเจน</span>
            <select id="o2" onchange="calc()">
                <option value="0">Air</option>
                <option value="2">Oxygen</option>
            </select>
        </div>
        <div class="row"><span class="label">5. ความดัน SBP</span><input type="number" id="sbp" oninput="calc()"></div>
        <div class="row"><span class="label">6. ชีพจร (Pulse)</span><input type="number" id="pulse" oninput="calc()"></div>
        <div class="row">
            <span class="label">7. ความรู้สึกตัว</span>
            <select id="avpu" onchange="calc()">
                <option value="0">Alert (A)</option>
                <option value="3">V, P, or U</option>
            </select>
        </div>
        <div class="row"><span class="label">8. อุณหภูมิ (°C)</span><input type="number" step="0.1" id="temp" oninput="calc()"></div>

        <div id="resultColor" class="result-box" style="background-color: #27ae60;">
            <div style="font-size: 0.8rem; font-weight: 700;">NEWS 2 TOTAL SCORE</div>
            <div class="score-val" id="scoreOut">0</div>
            <div id="adviceOut" class="advice">ระดับความเสี่ยงต่ำ: ประเมินตามรอบปกติ</div>
        </div>
    </div>

    <div class="share-area">
        <button class="btn-action" onclick="toggleShare()">แสดง QR Code เพื่อแชร์แอป</button>
        <div id="qrcode_display"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    function calc() {
        let score = 0;
        const rr = parseInt(document.getElementById('rr').value) || 0;
        const scale = document.getElementById('scale').value;
        const spo2 = parseInt(document.getElementById('spo2').value) || 0;
        const o2 = parseInt(document.getElementById('o2').value);
        const sbp = parseInt(document.getElementById('sbp').value) || 0;
        const pulse = parseInt(document.getElementById('pulse').value) || 0;
        const avpu = parseInt(document.getElementById('avpu').value);
        const temp = parseFloat(document.getElementById('temp').value) || 0;

        // RR logic
        if (rr <= 8 || rr >= 25) score += 3;
        else if (rr >= 21) score += 2;
        else if (rr <= 11) score += 1;

        // SpO2 logic (Separated Scales)
        if (scale == "1") {
            if (spo2 <= 91) score += 3;
            else if (spo2 <= 93) score += 2;
            else if (spo2 <= 95) score += 1;
        } else {
            if (spo2 <= 83 || (spo2 >= 97 && o2 == 2)) score += 3;
            else if (spo2 <= 85 || (spo2 >= 95 && o2 == 2)) score += 2;
            else if (spo2 <= 87 || (spo2 >= 93 && o2 == 2)) score += 1;
        }

        // Other parameters
        score += o2;
        if (sbp <= 90 || sbp >= 220) score += 3; else if (sbp <= 100) score += 2; else if (sbp <= 110) score += 1;
        if (pulse <= 40 || pulse >= 131) score += 3; else if (pulse >= 111) score += 2; else if (pulse <= 50 || pulse >= 91) score += 1;
        score += avpu;
        if (temp <= 35.0) score += 3; else if (temp >= 39.1) score += 2; else if (temp <= 36.0 || temp >= 38.1) score += 1;

        document.getElementById('scoreOut').innerText = score;
        const box = document.getElementById('resultColor');
        const adv = document.getElementById('adviceOut');

        if (score === 0) { box.style.backgroundColor = "#27ae60"; adv.innerText = "ความเสี่ยงต่ำ: ติดตามตามปกติ"; }
        else if (score <= 4) { box.style.backgroundColor = "#f39c12"; adv.innerText = "ความเสี่ยงต่ำ: ประเมินซ้ำทุก 4-6 ชม."; }
        else if (score <= 6) { box.style.backgroundColor = "#e67e22"; adv.innerText = "ความเสี่ยงปานกลาง: ประเมินทุก 1 ชม./ตามแพทย์"; }
        else { box.style.backgroundColor = "#d63031"; adv.innerText = "ความเสี่ยงสูง: ตามทีมกู้ชีพทันที!"; }
    }

    function toggleShare() {
        const d = document.getElementById('qrcode_display');
        if (d.style.display === "flex") d.style.display = "none";
        else {
            d.style.display = "flex";
            if (d.innerHTML === "") new QRCode(d, { text: window.location.href, width: 100, height: 100 });
        }
    }
</script>
</body>
</html>
